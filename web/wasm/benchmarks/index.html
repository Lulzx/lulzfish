<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lulzfish Benchmarks</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --ink: #20231f;
      --muted: #6d7467;
      --line: #d8dccf;
      --panel: #ffffff;
      --accent: #2f6f4e;
      --accent-soft: rgba(47,111,78,0.14);
      --loss: #a24d3d;
      --draw: #9a8550;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: linear-gradient(115deg, rgba(47,111,78,0.08), transparent 38%), var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 34px 0 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    .back {
      text-decoration: none;
      color: var(--muted);
      font-weight: 680;
    }

    h1 {
      margin: 24px 0 10px;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .lede {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.55;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.62);
      padding: 8px 10px;
      color: #3a4038;
      font-size: 13px;
      font-weight: 650;
    }

    .summary {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr;
      gap: 16px;
      margin-top: 28px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 18px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .card {
      background: rgba(255,255,255,0.76);
      border: 1px solid var(--line);
      padding: 16px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: start;
    }

    .card h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .style {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      padding-top: 4px;
    }

    .desc {
      min-height: 44px;
      color: var(--muted);
      line-height: 1.45;
      margin: 8px 0 14px;
      font-size: 14px;
    }

    .score-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      align-items: center;
    }

    .score {
      font-size: 28px;
      font-weight: 780;
      line-height: 1;
    }

    .bar {
      height: 12px;
      display: flex;
      background: #eceee7;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .win { background: var(--accent); }
    .draw { background: var(--draw); }
    .loss { background: var(--loss); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .stat {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .stat strong {
      display: block;
      color: var(--ink);
      font-size: 16px;
      margin-top: 2px;
    }

    .games {
      margin-top: 30px;
      border-top: 1px solid var(--line);
    }

    .games h2 {
      margin: 20px 0 12px;
      font-size: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.56);
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    td.moves {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #3a4038;
      max-width: 380px;
    }

    .loading, .error {
      margin-top: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      color: var(--muted);
    }

    .error {
      color: var(--loss);
    }

    @media (max-width: 820px) {
      .summary, .grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <a class="back" href="../">Back to board</a>
      <span class="pill">Micro-engine gauntlet</span>
    </div>

    <h1>Benchmark Results</h1>
    <p class="lede">
      Lulzfish against ten deterministic micro engines. Each opponent gets the same count of
      alternating-color games across the built-in opening suite, with capped plies and material adjudication.
    </p>

    <section id="content">
      <div class="loading">Loading benchmark data.</div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
