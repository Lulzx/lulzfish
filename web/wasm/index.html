<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lulzfish WASM</title>
  <link rel="stylesheet" href="https://unpkg.com/chessground@9.2.1/assets/chessground.base.css">
  <link rel="stylesheet" href="https://unpkg.com/chessground@9.2.1/assets/chessground.brown.css">
  <link rel="stylesheet" href="https://unpkg.com/chessground@9.2.1/assets/chessground.cburnett.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --ink: #20231f;
      --muted: #6d7467;
      --panel: #ffffff;
      --line: #d8dccf;
      --accent: #2f6f4e;
      --accent-dark: #244e39;
      --danger: #a24d3d;
      --eval-white: #f4f0e6;
      --eval-black: #3a4038;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: linear-gradient(110deg, rgba(47,111,78,0.08), transparent 34%), var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, select, input { font: inherit; }

    .shell {
      width: min(1280px, calc(100vw - 32px));
      min-height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(340px, 78dvh) minmax(300px, 1fr);
      gap: clamp(20px, 4vw, 48px);
      align-items: start;
      padding: 28px 0;
    }

    .board-column {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 10px;
      align-items: stretch;
      width: 100%;
      max-width: 760px;
    }

    .eval-bar {
      position: relative;
      border: 1px solid var(--line);
      background: var(--eval-black);
      min-height: 200px;
      border-radius: 2px;
      overflow: hidden;
    }

    .eval-bar-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 50%;
      background: var(--eval-white);
      transition: height 180ms ease;
    }

    .board-wrap { width: 100%; }

    .board-frame {
      position: relative;
      border: 1px solid rgba(32,35,31,0.18);
      background: #283025;
      padding: clamp(8px, 1.4vw, 14px);
      box-shadow: 0 22px 70px rgba(32,35,31,0.18);
    }

    .board {
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid rgba(32,35,31,0.42);
      overflow: hidden;
    }

    .board-overlay {
      position: absolute;
      inset: clamp(8px, 1.4vw, 14px);
      pointer-events: none;
      z-index: 4;
    }

    .board-overlay line {
      stroke-width: 2.5;
      stroke-linecap: round;
      opacity: 0.72;
    }

    .board square.last-move {
      background-color: rgba(214,185,95,0.44);
    }

    .board square.check {
      background: radial-gradient(circle, rgba(185,70,63,0.82) 0%, rgba(185,70,63,0.28) 58%, transparent 75%);
    }

    .board square.move-dest {
      background: radial-gradient(rgba(32,35,31,0.28) 19%, transparent 20%);
    }

    .board square.attack-heat {
      box-shadow: inset 0 0 0 999px rgba(47,111,78,0.22);
    }

    .side {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .brand {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 0.95;
      font-weight: 760;
    }

    .badge {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status {
      display: grid;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    .status-main {
      font-size: clamp(18px, 2.4vw, 26px);
      font-weight: 680;
      line-height: 1.15;
    }

    .status-sub, .eval-text {
      color: var(--muted);
      font-size: 15px;
    }

    .eval-text {
      font-variant-numeric: tabular-nums;
      font-weight: 650;
      color: var(--accent-dark);
    }

    .mode-row, .toggle-row, .controls, .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .mode-row label, .toggle-row label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 650;
      margin-right: 4px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 8px 12px;
      min-height: 38px;
      cursor: pointer;
      font-weight: 650;
    }

    .chip.active {
      border-color: var(--accent-dark);
      background: var(--accent);
      color: #fff;
    }

    .chip:disabled { opacity: 0.55; cursor: wait; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: end;
    }

    .field { display: grid; gap: 6px; }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    select, input {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 11px 12px;
      min-height: 44px;
      outline: none;
    }

    select:focus, input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47,111,78,0.12);
    }

    .button {
      border: 1px solid var(--accent-dark);
      background: var(--accent);
      color: #fff;
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 720;
    }

    .button.secondary {
      background: var(--panel);
      color: var(--ink);
      border-color: var(--line);
    }

    .button:disabled { opacity: 0.65; cursor: wait; }

    .thinking {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      padding: 10px 12px;
      font-size: 13px;
      display: none;
    }

    .thinking.open { display: block; }

    .thinking table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }

    .thinking th {
      text-align: left;
      color: var(--muted);
      font-weight: 650;
      padding: 2px 8px 6px 0;
    }

    .thinking td { padding: 2px 8px 2px 0; }

    .move-list {
      max-height: min(28dvh, 280px);
      overflow: auto;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 10px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      color: #3a4038;
      line-height: 1.75;
    }

    .features {
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .features summary {
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 650;
      color: var(--muted);
    }

    .feature-chart {
      display: grid;
      gap: 6px;
      padding: 0 12px 12px;
      max-height: 220px;
      overflow: auto;
    }

    .feature-row {
      display: grid;
      grid-template-columns: 28px 1fr 48px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }

    .feature-bar-wrap {
      height: 8px;
      background: #eceee6;
      border-radius: 2px;
      overflow: hidden;
    }

    .feature-bar {
      height: 100%;
      background: var(--accent);
    }

    .promotion {
      display: none;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .promotion.open { display: flex; }

    .promo-button {
      width: 42px;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      background: var(--panel);
      cursor: pointer;
      font-size: 22px;
    }

    .bench-link {
      display: grid;
      place-items: center;
      text-decoration: none;
      color: var(--ink);
      border: 1px solid var(--line);
      min-height: 42px;
      font-weight: 680;
    }

    .error {
      min-height: 20px;
      color: var(--danger);
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        width: min(100vw - 24px, 720px);
        padding: 16px 0 28px;
      }
      .board-column {
        max-width: none;
      }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="board-column" aria-label="Chess board">
      <div id="evalBar" class="eval-bar" aria-label="Evaluation bar">
        <div id="evalBarFill" class="eval-bar-fill"></div>
      </div>
      <div class="board-wrap">
        <div class="board-frame">
          <div id="board" class="board"></div>
          <svg id="graphOverlay" class="board-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
        </div>
      </div>
    </section>

    <section class="side">
      <div class="brand">
        <h1>Lulzfish</h1>
        <div class="badge">WASM</div>
      </div>

      <div class="status">
        <div id="statusMain" class="status-main">Loading engine</div>
        <div id="statusSub" class="status-sub"></div>
        <div id="evalText" class="eval-text">+0.00</div>
      </div>

      <div class="mode-row" role="group" aria-label="Mode">
        <label>Mode</label>
        <button type="button" class="chip mode-chip active" data-mode="play">Play</button>
        <button type="button" class="chip mode-chip" data-mode="analyze">Analyze</button>
        <button type="button" class="chip mode-chip" data-mode="hint">Hint</button>
      </div>

      <div class="toggle-row">
        <button type="button" id="toggleGraph" class="chip">Graph</button>
        <button type="button" id="toggleHeatmap" class="chip">Heatmap</button>
        <button type="button" id="refreshViz" class="chip secondary">Refresh viz</button>
      </div>

      <div id="thinking" class="thinking">
        <table>
          <thead>
            <tr><th>Depth</th><th>Score</th><th>Nodes</th><th>NPS</th></tr>
          </thead>
          <tbody>
            <tr>
              <td id="thinkDepth">—</td>
              <td id="thinkScore">—</td>
              <td id="thinkNodes">—</td>
              <td id="thinkNps">—</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="controls">
        <div class="field">
          <label for="color">Play as</label>
          <select id="color">
            <option value="white">White</option>
            <option value="black">Black</option>
          </select>
        </div>
        <div class="field">
          <label for="depth">Engine depth</label>
          <input id="depth" type="number" min="1" max="6" value="2">
        </div>
      </div>

      <div class="actions">
        <button id="newGame" class="button">New game</button>
        <button id="flip" class="button secondary">Flip board</button>
        <a class="bench-link" href="./benchmarks/">Benchmarks</a>
      </div>

      <div id="promotion" class="promotion">
        <span>Promote to</span>
        <button class="promo-button" data-promo="q">Q</button>
        <button class="promo-button" data-promo="r">R</button>
        <button class="promo-button" data-promo="b">B</button>
        <button class="promo-button" data-promo="n">N</button>
      </div>

      <div id="error" class="error"></div>
      <div id="moves" class="move-list"><span class="moves-empty">No moves yet.</span></div>

      <details id="featuresPanel" class="features">
        <summary>Feature vector (dev)</summary>
        <div id="featureChart" class="feature-chart"></div>
      </details>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
